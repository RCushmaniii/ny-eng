name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Lint (TypeScript & React)
        run: npx eslint "src/**/*.{ts,tsx}" 2>&1 || echo "::warning::Lint found issues — see output above"

      - name: Type check
        run: npx astro check --minimumSeverity warning 2>&1 || true

      - name: Build (includes sitemap validation)
        run: npm run build
